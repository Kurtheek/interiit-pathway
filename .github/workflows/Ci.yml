# =============================================================================
# .github/workflows/ci.yml — interiit-pathway CI
# =============================================================================
#
# WHY THE TWO-STAGE INSTALL?
# --------------------------
# pathway[xpack-llm-docs] requires docling, paddleocr, and unstructured.
# These three packages each have 100+ transitive dependencies with overlapping
# version constraints. Asking pip to solve the full graph in one pass causes:
#   "Dependency resolution exceeded maximum depth"
#
# The fix is a two-stage install:
#   Stage 1: install the conflict-prone packages FIRST with exact versions
#            pinned via constraints.txt — pip solves a tiny graph.
#   Stage 2: install the rest of requirements.txt — pip finds everything
#            already satisfied, no deep resolution needed.
#
# API KEYS (repo Settings → Secrets and variables → Actions)
# ----------------------------------------------------------
#   OPENAI_API_KEY   → P7 LLM calls (NOT needed for P3 — local embeddings)
#   POLYGON_API_KEY  → P1 live mode  (NOT needed for simulated mode)
#   FRED_API_KEY     → P4 macro data
# =============================================================================

name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:

  # ============================================================
  # Job 1: Import check + unit tests (blocks PR on failure)
  # ============================================================
  p3_unit_tests:
    name: "P3 — Import & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # libmagic1     → python-magic → unstructured file-type detection
      # poppler-utils → pdf2image   → UnstructuredParser PDF support
      - name: Install OS dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libmagic1 \
            poppler-utils

      # ── Two-stage install ──────────────────────────────────────
      # Stage 1: pin the packages with enormous dependency trees.
      #   docling, paddleocr, and unstructured all have 100+ transitive
      #   deps. Installing them first with exact versions means pip
      #   finds them already present and skips re-resolving them in Stage 2.
      #
      # Stage 2: install everything else. Since Stage 1 already placed
      #   the hard packages, pip's remaining graph is shallow.
      #
      # -c constraints.txt is also passed in Stage 2 as a safety net —
      #   it prevents pip from upgrading those packages as a side effect
      #   of resolving other dependencies.
      - name: "Stage 1: Pin conflict-prone packages"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            "docling==2.61.0" \
            "docling-core==2.57.0" \
            "unstructured==0.18.32" \
            "pdfminer-six==20250506" \
            "paddleocr==3.3.1"

      - name: "Stage 2: Install remaining requirements"
        run: |
          pip install -r requirements.txt -c constraints.txt

      # ── Layer 1: Import check ──────────────────────────────────
      - name: "Layer 1: Import check"
        run: |
          python - <<'EOF'
          import pathway as pw
          from pathway.xpacks.llm.parsers import UnstructuredParser
          from pathway.xpacks.llm.splitters import TokenCountSplitter
          from pathway.xpacks.llm.embedders import SentenceTransformerEmbedder
          from pathway.xpacks.llm.document_store import DocumentStore, DocumentStoreClient
          from pathway.xpacks.llm.servers import DocumentStoreServer
          from pathway.stdlib.indexing.nearest_neighbors import BruteForceKnnFactory
          from ingestion.state_manager import (
              get_persistence_config,
              get_persistence_backend,
              make_persistent_name,
          )
          from schemas.agent_signals_schema import (
              AgentSignalSchema,
              SIGNAL_BUY, SIGNAL_SELL, SIGNAL_HOLD,
              SIGNAL_ANOMALY, SIGNAL_FRAUD_ALERT,
              INVESTMENT_SIGNALS, FRAUD_SIGNALS,
          )
          from schemas.sanctions_schema import (
              SanctionsSchema,
              HIGH_PRIORITY_PROGRAMS,
          )
          print("All P3 imports resolved correctly")
          EOF

      # ── Layer 2: state_manager unit tests ──────────────────────
      - name: "Layer 2: state_manager unit tests"
        run: |
          python - <<'EOF'
          import os
          import pathway as pw
          from ingestion.state_manager import (
              get_persistence_backend,
              get_persistence_config,
              make_persistent_name,
          )

          backend = get_persistence_backend()
          assert isinstance(backend, pw.persistence.Backend), \
              f"Expected Backend, got {type(backend)}"
          print("get_persistence_backend() -> pw.persistence.Backend OK")

          config = get_persistence_config()
          assert isinstance(config, pw.persistence.Config), \
              f"Expected Config, got {type(config)}"
          print("get_persistence_config() -> pw.persistence.Config OK")

          assert os.path.isdir("data/persistence"), \
              "data/persistence/ was not created"
          print("data/persistence/ directory exists OK")

          assert make_persistent_name("news_docs") == "interiit_news_docs"
          assert make_persistent_name("price_source") == "interiit_price_source"
          print("make_persistent_name() OK")

          print("All state_manager tests passed")
          EOF

      # ── Layer 2: Schema contract tests ────────────────────────
      - name: "Layer 2: Schema contract tests"
        run: |
          python - <<'EOF'
          from schemas.agent_signals_schema import (
              AgentSignalSchema, INVESTMENT_SIGNALS, FRAUD_SIGNALS,
          )
          from schemas.sanctions_schema import SanctionsSchema, HIGH_PRIORITY_PROGRAMS

          cols = AgentSignalSchema.column_names()
          for col in ["timestamp", "ticker", "signal_type", "ml_score",
                      "signal_strength", "shap_top_feature", "shap_top_value",
                      "rationale", "news_citations", "source_pipeline"]:
              assert col in cols, f"AgentSignalSchema missing: '{col}'"
          print(f"AgentSignalSchema {len(cols)} columns OK")

          assert INVESTMENT_SIGNALS == {"BUY", "SELL", "HOLD"}
          assert FRAUD_SIGNALS == {"ANOMALY", "FRAUD_ALERT"}
          print("Signal routing sets OK")

          scols = SanctionsSchema.column_names()
          for col in ["sdn_uid", "entity_name", "entity_name_normalized",
                      "entity_type", "program", "country", "alias",
                      "list_date", "last_updated", "remarks"]:
              assert col in scols, f"SanctionsSchema missing: '{col}'"
          print(f"SanctionsSchema {len(scols)} columns OK")

          assert "RUSSIA-EO14024" in HIGH_PRIORITY_PROGRAMS
          assert "SDGT" in HIGH_PRIORITY_PROGRAMS
          print("HIGH_PRIORITY_PROGRAMS OK")

          print("All schema tests passed")
          EOF

  # ============================================================
  # Job 2: Vector server smoke test (non-blocking)
  # ============================================================
  p3_server_smoke_test:
    name: "P3 — Vector Server Smoke Test (non-blocking)"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install OS dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libmagic1 \
            poppler-utils

      - name: "Stage 1: Pin conflict-prone packages"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            "docling==2.61.0" \
            "docling-core==2.57.0" \
            "unstructured==0.18.32" \
            "pdfminer-six==20250506" \
            "paddleocr==3.3.1"

      - name: "Stage 2: Install remaining requirements"
        run: |
          pip install -r requirements.txt -c constraints.txt

      - name: "Layer 3: Vector server smoke test"
        timeout-minutes: 10
        run: |
          python - <<'EOF'
          import os, sys, threading, time

          os.makedirs("data/news_docs", exist_ok=True)
          with open("data/news_docs/ci_test.txt", "w") as f:
              f.write(
                  "Apple reported record Q1 earnings driven by iPhone 15 sales. "
                  "Revenue beat analyst estimates by 8 percent."
              )

          from ingestion.vector_index import (
              build_and_run_vector_index,
              wait_until_ready,
              query_vector_index,
          )
          t = threading.Thread(
              target=build_and_run_vector_index,
              kwargs={"threaded": True},
              daemon=True,
          )
          t.start()
          time.sleep(3)

          ready = wait_until_ready(timeout_s=300, poll_interval_s=5)
          if not ready:
              print("Server not ready in time - skipping query")
              sys.exit(0)

          results = query_vector_index("Apple iPhone earnings", k=2)
          assert len(results) > 0, f"Expected results, got {results}"
          print(f"Got {len(results)} result(s), dist={results[0]['dist']:.4f}")
          print("Vector server smoke test passed")
          EOF
